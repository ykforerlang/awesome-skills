<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Charts Visualization 配置助手</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="stylesheet" href="./styles.css" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B9MX1HK14W"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag("js", new Date());
      gtag("config", "G-B9MX1HK14W");
    </script>
  </head>
  <body>
    <div class="page-shell">
      <main id="desktop-layout" class="desktop-layout">
        <div class="workspace">
          <section id="focus-banner" class="focus-banner hidden">
            <div class="focus-banner-copy">
              <p class="eyebrow">当前正在调整</p>
              <h2 id="focus-banner-title">折线图</h2>
              <p class="focus-banner-note">
                调整完成后，点击“复制配置到 Agent 对话”，再把导出命令粘贴回当前对话继续生效。
              </p>
            </div>
            <button
              id="focus-banner-toggle"
              class="secondary-button small focus-toggle-button hidden"
              data-toggle-chart-switcher="true"
              type="button"
            >
              切换其他图表
            </button>
          </section>

          <section id="chart-picker-panel" class="panel">
            <div class="section-heading">
              <div>
                <p class="section-kicker">步骤 1</p>
                <h2>图表类型</h2>
              </div>
              <p class="section-note">
                在这里切换图表类型。切换后，可配置字段和预览会立即同步更新。
              </p>
            </div>
            <div id="chart-grid" class="chart-grid"></div>
          </section>

          <section class="panel">
            <div class="section-heading">
              <div>
                <p class="section-kicker">步骤 2</p>
                <h2>配置内容</h2>
              </div>
              <div id="chart-summary" class="chart-summary"></div>
            </div>
            <div class="config-layout">
              <div class="config-column">
                <section class="subpanel">
                  <h3>基础样式</h3>
                  <div class="foundation-stack">
                    <section id="title-group" class="foundation-group"></section>
                    <section id="legend-group" class="foundation-group"></section>
                    <section id="layout-group" class="foundation-group"></section>
                    <section id="axes-group" class="foundation-group"></section>
                    <section id="split-lines-group" class="foundation-group"></section>
                  </div>
                </section>

                <section class="subpanel">
                  <div class="subpanel-head">
                    <h3>图表专属样式</h3>
                    <span id="specific-caption" class="ghost-badge"></span>
                  </div>
                  <div id="specific-fields" class="field-grid"></div>
                </section>
              </div>

              <div class="output-column">
                <section class="subpanel preview-panel">
                  <div class="subpanel-head">
                    <h3>预览</h3>
                  </div>
                  <div id="error-box" class="error-box hidden"></div>
                  <div id="dual-axis-preview-controls" class="dual-axis-preview-controls hidden"></div>
                  <div class="preview-stage-panel">
                    <div class="preview-stage-head">
                      <span class="preview-stage-title">图表</span>
                      <span class="preview-stage-note">所见即所得预览</span>
                    </div>
                    <div class="preview-stage-body">
                      <div class="preview-device-stage">
                        <div id="preview-canvas" class="preview-canvas"></div>
                      </div>
                    </div>
                  </div>
                </section>
              </div>
            </div>
          </section>
        </div>
      </main>

      <section class="desktop-bottom-bar">
        <div class="desktop-bottom-bar-copy">
          <p class="desktop-bottom-bar-title">复制配置到 Agent 对话</p>
          <p class="desktop-bottom-bar-note">调完后复制，粘贴回当前对话。</p>
        </div>
        <button class="secondary-button desktop-bottom-copy-button" data-copy-target="style-output" type="button">
          复制配置到 Agent 对话
        </button>
      </section>

      <main id="mobile-layout" class="mobile-layout hidden">
        <div id="mobile-preview-sticky" class="mobile-preview-sticky">
          <section class="mobile-card mobile-preview-card">
            <div class="mobile-section-head">
              <div id="mobile-preview-title" class="mobile-section-title">折线图</div>
              <div class="mobile-preview-head-actions">
                <button
                  id="mobile-switch-chart-button"
                  class="mobile-secondary-button hidden"
                  data-toggle-chart-switcher="true"
                  type="button"
                >
                  切换图表
                </button>
              </div>
            </div>
            <p class="mobile-copy-hint">调完后复制配置，粘贴回对话。</p>

            <div id="mobile-preview-controls" class="mobile-preview-config-panel hidden"></div>

            <div class="mobile-preview-stage-shell">
              <div id="mobile-preview-canvas" class="preview-canvas mobile-preview-canvas"></div>
            </div>
          </section>

          <section class="mobile-card mobile-tabs-card">
            <div id="mobile-chart-tabs-scroll" class="mobile-tabs-scroll">
              <div id="mobile-chart-tabs" class="mobile-tabs-row"></div>
            </div>
          </section>
        </div>

        <section id="mobile-config-card" class="mobile-card mobile-config-card">
          <div class="mobile-section-head">
            <div class="mobile-section-title">配置项</div>
            <div id="mobile-config-chip" class="mobile-section-chip"></div>
          </div>

          <div class="mobile-section-tabs-shell">
            <div id="mobile-config-tabs-scroll" class="mobile-section-tabs-scroll">
              <div id="mobile-config-tabs" class="mobile-section-tabs-row"></div>
            </div>
          </div>

          <div id="mobile-config-panel-scroll" class="mobile-config-panel-scroll">
            <section id="mobile-config-panel" class="mobile-form-section hidden">
              <div id="mobile-config-panel-title" class="mobile-form-section-title"></div>
              <div id="mobile-config-panel-help" class="mobile-form-section-help hidden"></div>
              <div id="mobile-config-fields" class="mobile-field-grid"></div>
            </section>
          </div>
        </section>

        <section class="mobile-bottom-bar">
          <div class="mobile-bottom-bar-copy">
            <p class="mobile-bottom-bar-title">调完后复制配置</p>
            <p class="mobile-bottom-bar-note">复制后粘贴回当前对话。</p>
          </div>
          <button class="mobile-copy-button mobile-bottom-copy-button" data-copy-target="style-output" type="button">
            复制配置
          </button>
        </section>
      </main>

      <pre id="style-output" class="hidden"></pre>

      <div id="toast" class="toast hidden"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
    <script src="../shared/charts-default-config.js"></script>
    <script src="../shared/charts-default-data.js"></script>
    <script src="../shared/chart-runtime-definitions.js"></script>
    <script src="../shared/option-builder.js"></script>
    <script src="../shared/schema.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
